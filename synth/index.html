<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Connection Debugger</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 2rem; }
        button { background: #d27b2d; color: white; padding: 1rem; font-size: 1.2rem; border: none; cursor: pointer; width: 100%; border-radius: 4px; }
        #console { background: #000; border: 1px solid #333; padding: 1rem; margin-top: 1rem; min-height: 200px; white-space: pre-wrap; }
    </style>
</head>
<body>

    <h1>BLE-MIDI Handshake Debugger</h1>
    <button id="scan-btn">1. Scan for ESP32-S3</button>
    <div id="console">Awaiting click...</div>

    <script>
        // Official Standard BLE-MIDI Service UUID
        const MIDI_SERVICE_UUID = "03b80e5a-ede8-4b33-a751-6ce34ec4c700";
        const output = document.getElementById('console');

        document.getElementById('scan-btn').addEventListener('click', async () => {
            printLog("Opening Browser Bluetooth Scanner...");
            
            try {
                // SCANNING STRATEGY:
                // We ask the browser to search for ANY device advertising the official MIDI service
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [MIDI_SERVICE_UUID] }],
                    optionalServices: [MIDI_SERVICE_UUID]
                });

                printLog(`SUCCESS: Found Device! Name: ${device.name} | ID: ${device.id}`);
                printLog("Attempting to connect to the GATT server...");
                
                const server = await device.gatt.connect();
                printLog("GATT Server Connected! Handshake complete. Your browser can talk to your ESP32.");

            } catch (error) {
                printLog(`ERROR: ${error.message}`);
                printLog("Troubleshooting tips below...");
            }
        });

        function printLog(text) {
            output.innerText += `\n[${new Date().toLocaleTimeString()}] ${text}`;
        }
    </script>
</body>
</html>
