<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Sonification Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }
        
        .version-stamp {
            position: absolute;
            top: 1rem;
            right: 2rem;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            background-color: hsla(210, 85%, 25%, 0.5); /* v0.5.1 Structural Synchronization */
            border: 1px solid hsl(210, 85%, 45%);
            color: hsl(210, 95%, 75%);
            text-align: right;
            line-height: 1.2;
        }

        .hardware-gate-box {
            background-color: #1e1e1e;
            border: 2px solid #d27b2d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #333;
        }
        h1, h2 { margin-top: 0; color: #fff; }
        
        .control-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .metric-box {
            background-color: #151515;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        .metric-label { font-size: 0.85rem; color: #aaa; text-transform: uppercase; margin-bottom: 0.5rem; }
        .metric-value { font-size: 1.8rem; font-weight: bold; color: #d27b2d; font-family: monospace; }

        .chart-container-mini {
            position: relative;
            width: 100%;
            height: 90px;
            margin-top: 0.25rem;
        }
        .mini-oscilloscope {
            background-color: #080808;
            border: 1px solid #333;
            border-radius: 4px;
            width: 100%;
            height: 100%;
            display: block;
        }
        .chart-value-overlay {
            position: absolute;
            bottom: 4px;
            right: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(8, 8, 8, 0.75);
            padding: 1px 4px;
            border-radius: 2px;
            pointer-events: none;
        }
        #chart-number-overlay { color: #e07a1d; }
        #raw-number-overlay { color: #00ffcc; }

        #connect-btn {
            background-color: #d27b2d;
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1.2rem;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        #connect-btn:hover { background-color: #b36422; }
        
        select, input[type="range"], input[type="number"] {
            width: 100%;
            padding: 0.5rem;
            background: #252525;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input[type="range"] { padding: 0; cursor: pointer; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        .range-inputs { display: flex; gap: 0.5rem; }

        .piano-matrix {
            display: flex;
            justify-content: space-between;
            background: #151515;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #444;
            margin-top: 0.5rem;
        }
        .key-toggle {
            flex: 1;
            margin: 0 2px;
            background: #222;
            color: #888;
            border: 1px solid #444;
            padding: 0.5rem 0;
            font-size: 0.75rem;
            font-family: monospace;
            text-align: center;
            border-radius: 2px;
            cursor: pointer;
            user-select: none;
        }
        .key-toggle.active { background: #d27b2d; color: #fff; border-color: #fff; }
        .key-toggle.black-key { background: #000; }
        .key-toggle.black-key.active { background: #b36422; }

        #piano-roll-canvas {
            background-color: #080808;
            border: 1px solid #444;
            border-radius: 4px;
            display: block;
            width: 100%;
        }

        .log-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
