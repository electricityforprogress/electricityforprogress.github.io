<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Sonification Dashboard</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #e0e0e0; padding: 2rem; max-width: 1000px; margin: 0 auto; }
        .card { background-color: #1e1e1e; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #333; }
        h1, h2 { color: #fff; }
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        
        /* Piano Keyboard */
        .piano-keyboard { display: flex; height: 100px; margin-top: 1rem; border: 1px solid #444; }
        .key { flex: 1; border: 1px solid #000; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5px; font-size: 0.7rem; background: #eee; color: #000; }
        .key.black { background: #333; color: #fff; }
        .key.inactive { opacity: 0.3; }
        .key.active-blue { border: 3px solid #2d7bd2; }
        .key.playing { background: #f0a050 !important; }

        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #d27b2d; }
        input:checked + .slider:before { transform: translateX(26px); }

        #connect-btn { background-color: #d27b2d; color: white; border: none; padding: 1rem; width: 100%; font-weight: bold; cursor: pointer; }
        #piano-roll-canvas { background-color: #080808; width: 100%; height: 200px; }
    </style>
</head>
<body>

    <h1>Electricity for Progress: Biodata Sonification</h1>

    <div class="card">
        <h2>1. Hardware Connection</h2>
        <button id="connect-btn">Connect via Bluetooth (BLE-MIDI)</button>
    </div>

    <div class="card">
        <h2>2. Audio Synthesis & MIDI Routing</h2>
        <div class="control-grid">
            <select id="sound-selector"><option value="vibes">Vibes</option><option value="tr808">TR-808</option></select>
            <label class="switch"><input type="checkbox" id="audio-toggle" checked><span class="slider"></span></label>
        </div>
        <select id="midi-output-selector"><option value="none">No External MIDI</option></select>
    </div>

    <div class="card">
        <h2>3. Quantization, Scales & Note Mapping</h2>
        <select id="scale-selector"><option value="chromatic">Chromatic</option><option value="major">Major</option></select>
        <div class="piano-keyboard" id="piano-keys">
            <script>
                const keys = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
                keys.forEach((n, i) => {
                    const div = document.createElement('div');
                    div.className = `key ${n.includes('#') ? 'black' : ''} active-blue`;
                    div.id = 'key-' + i;
                    div.innerHTML = n;
                    div.onclick = () => { div.classList.toggle('active-blue'); div.classList.toggle('inactive'); };
                    document.write(div.outerHTML);
                });
            </script>
        </div>
    </div>

    <div class="card">
        <h2>4. Live Visualizer</h2>
        <canvas id="piano-roll-canvas"></canvas>
    </div>

    <div class="card">
        <h2>5. Live System Output Log</h2>
        <div id="status-log" style="height: 100px; overflow: auto; background: #000; color: #0f0; font-family: monospace;"></div>
    </div>

    <script>
        // CORE LOGIC
        const System = {
            output: null,
            audioMuted: false,
            scaleMap: new Array(12).fill(true)
        };

        function lightKey(note) {
            const key = document.getElementById('key-' + (note % 12));
            if(key) {
                key.classList.add('playing');
                setTimeout(() => key.classList.remove('playing'), 200);
            }
        }

        document.getElementById('connect-btn').onclick = async () => {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: ["03b80e5a-ede8-4b33-a751-6ce34ec4c700"] }], optionalServices: ["03b80e5a-ede8-4b33-a751-6ce34ec4c700"] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("03b80e5a-ede8-4b33-a751-6ce34ec4c700");
            const char = await service.getCharacteristic("7772e5db-3868-4112-a1a9-f2669d106bf3");
            await char.startNotifications();
            char.addEventListener('characteristicvaluechanged', (e) => {
                const note = e.target.value.getUint8(3);
                lightKey(note);
                if(System.output) System.output.send([0x90, note, 100]);
            });
        };

        // Initialize MIDI Outputs
        navigator.requestMIDIAccess().then(access => {
            const select = document.getElementById('midi-output-selector');
            access.outputs.forEach(o => {
                const opt = document.createElement('option');
                opt.value = o.id; opt.text = o.name;
                select.add(opt);
                if(o.name.includes("IAC")) System.output = o;
            });
            select.onchange = (e) => System.output = access.outputs.get(e.target.value);
        });
    </script>
</body>
</html>
