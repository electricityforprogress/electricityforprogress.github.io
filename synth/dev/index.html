<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Sonification Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 2rem;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
        }
        
        .version-stamp {
            position: absolute;
            top: 1rem;
            right: 2rem;
            font-family: monospace;
            font-size: 0.75rem;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            background-color: hsla(280, 80%, 25%, 0.5);
            border: 1px solid hsl(280, 80%, 45%);
            color: hsl(280, 95%, 75%);
        }

        h2, h3 { color: #fff; font-weight: 500; }

        .control-group {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .hardware-gate-box { border: 2px solid #d27b2d; }
        .synth-box { border: 2px solid #2b8a3e; }

        label {
            display: block;
            margin-top: 1rem;
            margin-bottom: 0.25rem;
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="range"], input[type="number"], select {
            width: 100%;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 0.5rem;
            border-radius: 4px;
        }

        canvas {
            width: 100%;
            height: 200px;
            background-color: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .piano-roll {
            display: flex;
            height: 120px;
            gap: 2px;
            margin-bottom: 2rem;
        }

        .piano-key {
            flex: 1;
            background-color: #f0f0f0;
            color: #333;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 0.5rem;
            font-weight: bold;
            border-radius: 0 0 4px 4px;
            position: relative;
            transition: opacity 0.2s;
        }

        .piano-key.black {
            background-color: #222;
            color: #aaa;
            height: 80px;
            margin: 0 -3%;
            z-index: 1;
        }

        .piano-key.inactive {
            opacity: 0.2;
            background-color: #555;
        }

        /* Note Activation Highlight - Centered for legibility */
        .piano-key.active::after {
            content: '';
            position: absolute;
            top: 20%;
            bottom: 20%;
            left: 25%;
            right: 25%;
            background-color: rgba(0, 150, 255, 0.8);
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(0, 150, 255, 0.6);
            pointer-events: none;
        }

        button {
            width: 100%;
            padding: 1rem;
            font-size: 1.1rem;
            background-color: #444;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #555; }
    </button>
    </style>
</head>
<body>
    <div class="version-stamp">v0.7.0 Modular Architecture</div>
    
    <h2>Biodata Sonification Dashboard</h2>

    <canvas id="raw-data-canvas"></canvas>

    <div class="control-group hardware-gate-box">
        <h3>Hardware & Timing</h3>
        
        <label for="threshold-cc">Trigger Threshold (Hardware CC)</label>
        <input type="range" id="threshold-cc" min="0" max="127" value="64">
        
        <label for="biorhythm-mix">Biorhythm (0 = Natural Plant, 1 = Quantized to Grid)</label>
        <input type="range" id="biorhythm-mix" min="0" max="1" step="0.01" value="0">
    </div>

    <div class="control-group synth-box">
        <h3>Synthesis Tuning & Scale</h3>
        
        <label for="scale-selector">Base Scale Pattern</label>
        <select id="scale-selector" class="control-dropdown">
            <option value="major">Major</option>
            <option value="minor">Minor</option>
            <option value="pentatonic">Pentatonic</option>
        </select>

        <label for="scale-root">Scale Root (Shift)</label>
        <select id="scale-root" class="control-dropdown">
            <option value="0">C</option><option value="1">C#</option><option value="2">D</option>
            <option value="3">D#</option><option value="4">E</option><option value="5">F</option>
            <option value="6">F#</option><option value="7">G</option><option value="8">G#</option>
            <option value="9">A</option><option value="10">A#</option><option value="11">B</option>
        </select>

        <label for="coarse-tune">Coarse Tune (Semitones)</label>
        <input type="number" id="coarse-tune" min="-24" max="24" value="0">
        
        <label for="fine-tune">Fine Tune (Cents)</label>
        <input type="range" id="fine-tune" min="-1.0" max="1.0" step="0.01" value="0">
    </div>

    <div class="piano-roll" id="keyboard">
        <div class="piano-key white" id="piano-key-0">C</div>
        <div class="piano-key black" id="piano-key-1">C#</div>
        <div class="piano-key white" id="piano-key-2">D</div>
        <div class="piano-key black" id="piano-key-3">D#</div>
        <div class="piano-key white" id="piano-key-4">E</div>
        <div class="piano-key white" id="piano-key-5">F</div>
        <div class="piano-key black" id="piano-key-6">F#</div>
        <div class="piano-key white" id="piano-key-7">G</div>
        <div class="piano-key black" id="piano-key-8">G#</div>
        <div class="piano-key white" id="piano-key-9">A</div>
        <div class="piano-key black" id="piano-key-10">A#</div>
        <div class="piano-key white" id="piano-key-11">B</div>
    </div>

    <button id="connect-btn">Connect to Biodata Device</button>

    <script>
        // --- System Data Bus ---
        const SystemBus = {
            MIDI_SERVICE_UUID: '03b80e5a-ede8-4b33-a751-6ce34ec4c700',
            MIDI_CHARACTERISTIC_UUID: '7772e5db-3868-4112-a1a9-f2669d106bf3',
            scaleRoot: 0,
            scaleSelector: 'major',
            customScaleMap: new Array(12).fill(true),
            biorhythm: 0.0,
            synthChannels: [],
            thresholdCC: 64,
            bleCharacteristic: null
        };

        const PITCH_COLORS = ['#FF5733', '#FFBD33', '#DBFF33', '#75FF33', '#33FF57', '#33FFBD', '#33DBFF', '#3375FF', '#5733FF', '#FF33BD', '#FF3375', '#FF3333'];

        // --- Visual Engine ---
        const VisualEngine = {
            canvas: document.getElementById('raw-data-canvas'),
            ctx: null,
            scrollPosition: 0,
            
            init() {
                if (this.canvas) {
                    this.ctx = this.canvas.getContext('2d');
                    this.canvas.width = this.canvas.offsetWidth;
                    this.canvas.height = this.canvas.offsetHeight;
                    this.renderLoop();
                }
            },
            
            renderLoop() {
                if (!this.ctx) return;
                // Fade effect for scrolling waterfall
                this.ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                requestAnimationFrame(() => this.renderLoop());
            },

            renderNoteTrigger(pitch, velocity) {
                if (!this.ctx) return;
                
                // Map velocity to line length
                const lineLength = (velocity / 127) * (this.canvas.height - 20) + 10;
                const color = PITCH_COLORS[pitch % 12];
                
                // Move x position across screen
                this.scrollPosition = (this.scrollPosition + 4) % this.canvas.width;
                
                this.ctx.strokeStyle = color;
                this.ctx.lineWidth = 3;
                this.ctx.beginPath();
                this.ctx.moveTo(this.scrollPosition, 0);
                this.ctx.lineTo(this.scrollPosition, lineLength);
                this.ctx.stroke();
            }
        };

        // --- Mod Matrix Skeleton ---
        class ModMatrix {
            constructor() {
                this.matrix = [new Array(10).fill(0), new Array(10).fill(0)];
            }
        }

        // --- 4-Channel Synth Core ---
        class SynthCore {
            constructor(ctx, channelIndex) {
                this.ctx = ctx;
                this.channelIndex = channelIndex;
                this.modMatrix = new ModMatrix();
                
                this.coarseTune = 0;
                this.fineTune = 0;
                this.attack = 0.05; 
                this.decay = 0.2; 
                this.sustain = 0.3; 
                this.release = 1.0;

                this.filter = this.ctx.createBiquadFilter();
                this.filter.type = 'lowpass';
                this.filter.frequency.value = 2500;
                
                this.vca = this.ctx.createGain();
                this.vca.gain.value = 0;

                this.filter.connect(this.vca);
                this.vca.connect(this.ctx.destination);
            }

            triggerNote(midiNote, velocity, time) {
                // Apply Course and Fine tuning
                const frequency = 440 * Math.pow(2, ((midiNote + this.coarseTune + this.fineTune) - 69) / 12);
                
                const osc = this.ctx.createOscillator();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(frequency, time);
                
                const peakGain = velocity / 127;
                this.vca.gain.cancelScheduledValues(time);
                this.vca.gain.setValueAtTime(0, time);
                
                // ADSR Envelope
                this.vca.gain.linearRampToValueAtTime(peakGain, time + this.attack);
                this.vca.gain.exponentialRampToValueAtTime(peakGain * this.sustain, time + this.attack + this.decay);

                osc.connect(this.filter);
                osc.start(time);
                
                // Auto-release based on plant trigger speed
                setTimeout(() => {
                    const releaseTime = this.ctx.currentTime;
                    this.vca.gain.cancelScheduledValues(releaseTime);
                    this.vca.gain.setValueAtTime(this.vca.gain.value, releaseTime);
                    this.vca.gain.linearRampToValueAtTime(0.001, releaseTime + this.release);
                    setTimeout(() => osc.stop(), (this.release + 0.1) * 1000);
                }, 200);
            }
        }

        // --- Round Robin Voice Allocator ---
        const VoiceAllocator = {
            pointer: 0,
            getNextChannel: function() {
                const channel = this.pointer;
                this.pointer = (this.pointer + 1) % 4; 
                return channel;
            }
        };

        // --- Decoupled MIDI Router ---
        const MidiRouter = {
            routeInbound: function(event) {
                const data = new Uint8Array(event.target.value.buffer);
                for (let i = 0; i < data.length; i += 3) {
                    const statusByte = data[i];
                    const data1 = data[i + 1];
                    const data2 = data[i + 2];
                    const messageType = statusByte >> 4;
                    
                    if (messageType === 9 && data2 > 0) {
                        // 1. Check if note is in active scale
                        if (!SystemBus.customScaleMap[data1 % 12]) continue;

                        // 2. Allocate to a channel
                        const targetChannel = VoiceAllocator.getNextChannel();
                        const synth = SystemBus.synthChannels[targetChannel];
                        
                        // 3. UI Key Highlight
                        const key = document.getElementById('piano-key-' + (data1 % 12));
                        if (key) {
                            key.classList.add('active');
                            setTimeout(() => key.classList.remove('active'), 200);
                        }

                        // 4. Trigger Audio & Visuals
                        synth.triggerNote(data1, data2, synth.ctx.currentTime);
                        VisualEngine.renderNoteTrigger(data1, data2);
                    } 
                }
            },
            sendCC: async function(ccNumber, value) {
                if (SystemBus.bleCharacteristic) {
                    const buffer = new Uint8Array([0xB0, ccNumber, value]);
                    await SystemBus.bleCharacteristic.writeValue(buffer);
                }
            }
        };

        // --- Scale & Root Engine ---
        function updateScaleLogic() {
            const SCALE_PATTERNS = {
                major: [true, false, true, false, true, true, false, true, false, true, false, true],
                minor: [true, false, true, true, false, true, false, true, true, false, true, false],
                pentatonic: [true, false, true, false, true, false, false, true, false, true, false, false]
            };

            const basePattern = SCALE_PATTERNS[SystemBus.scaleSelector] || SCALE_PATTERNS.major;
            const root = SystemBus.scaleRoot;

            // Shift pattern array mathematically
            SystemBus.customScaleMap = basePattern.map((_, i) => basePattern[(i - root + 12) % 12]);

            // Sync UI Key styling
            for (let i = 0; i < 12; i++) {
                const key = document.getElementById('piano-key-' + i);
                if (key) {
                    key.classList.toggle('inactive', !SystemBus.customScaleMap[i]);
                }
            }
        }

        // --- Initialization & UI Binding ---
        function initializeSystem() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            for (let i = 0; i < 4; i++) {
                SystemBus.synthChannels.push(new SynthCore(ctx, i));
            }
            VisualEngine.init();
            updateScaleLogic();
            console.log("v0.7.0 Engine Online. 4 Channels Active.");
        }

        // Bind HTML Inputs
        document.getElementById('scale-selector').addEventListener('change', (e) => {
            SystemBus.scaleSelector = e.target.value;
            updateScaleLogic();
        });

        document.getElementById('scale-root').addEventListener('change', (e) => {
            SystemBus.scaleRoot = parseInt(e.target.value, 10);
            updateScaleLogic();
        });

        document.getElementById('coarse-tune').addEventListener('input', (e) => {
            const val = parseInt(e.target.value, 10);
            SystemBus.synthChannels.forEach(ch => ch.coarseTune = val);
        });

        document.getElementById('fine-tune').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            SystemBus.synthChannels.forEach(ch => ch.fineTune = val);
        });

        document.getElementById('threshold-cc').addEventListener('change', (e) => {
            const val = parseInt(e.target.value, 10);
            MidiRouter.sendCC(64, val); 
        });

        document.getElementById('biorhythm-mix').addEventListener('input', (e) => {
            SystemBus.biorhythm = parseFloat(e.target.value);
        });

        // Bluetooth Connect Logic
        document.getElementById('connect-btn').addEventListener('click', async () => {
            if (SystemBus.synthChannels.length === 0) initializeSystem();
            
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SystemBus.MIDI_SERVICE_UUID] }]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SystemBus.MIDI_SERVICE_UUID);
                SystemBus.bleCharacteristic = await service.getCharacteristic(SystemBus.MIDI_CHARACTERISTIC_UUID);
                
                await SystemBus.bleCharacteristic.startNotifications();
                SystemBus.bleCharacteristic.addEventListener('characteristicvaluechanged', MidiRouter.routeInbound);
                
                document.getElementById('connect-btn').innerText = "System Connected";
                document.getElementById('connect-btn').style.backgroundColor = "#2b8a3e";
            } catch (err) {
                console.error("Bluetooth connection failed", err);
            }
        });
    </script>
</body>
</html>
